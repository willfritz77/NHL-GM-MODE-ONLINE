<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHL GM MODE — 2025-26</title>
<style>
:root {
  --bg: #0a0c0f;
  --bg2: #111418;
  --bg3: #181c22;
  --border: #1e242d;
  --ice: #4fc3f7;
  --ice2: #29b6f6;
  --red: #ef5350;
  --green: #66bb6a;
  --gold: #ffa726;
  --text: #e8eaed;
  --text2: #8d96a3;
  --text3: #4a5568;
  --mono: 'Courier New', monospace;
  --cap: 95500000;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; overflow-x: hidden; }
button { cursor: pointer; border: none; background: none; color: inherit; font-family: inherit; font-size: inherit; }
input, select { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 4px; font-family: inherit; font-size: 12px; outline: none; }
input:focus, select:focus { border-color: var(--ice); }
.hidden { display: none !important; }

/* ── LOADING ── */
#loading-overlay {
  position: fixed; inset: 0; background: var(--bg); z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
}
.load-puck { font-size: 56px; animation: spin 1.2s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.load-title { font-family: var(--mono); font-size: 20px; color: var(--ice); letter-spacing: 3px; }
.load-sub { font-family: var(--mono); font-size: 11px; color: var(--text2); }
.load-bar-wrap { width: 280px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.load-bar { height: 100%; background: var(--ice); border-radius: 2px; width: 0; transition: width 0.3s; }

/* ── INTRO ── */
#intro {
  position: fixed; inset: 0; background: var(--bg); z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0;
}
.intro-logo { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 4px; margin-bottom: 16px; }
.intro-title { font-size: 48px; font-weight: 900; letter-spacing: -2px; color: var(--text); margin-bottom: 4px; }
.intro-title span { color: var(--ice); }
.intro-season { font-family: var(--mono); font-size: 13px; color: var(--text2); margin-bottom: 40px; }
.intro-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
  padding: 32px; width: 380px; display: flex; flex-direction: column; gap: 14px;
}
.inp-label { font-size: 10px; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
.intro-card input { width: 100%; }
.btn { padding: 10px 20px; border-radius: 5px; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; transition: opacity 0.15s; }
.btn:hover { opacity: 0.85; }
.btn-ice { background: var(--ice); color: #000; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-outline:hover { border-color: var(--ice); color: var(--ice); }
.btn-red { background: var(--red); color: #fff; }
.btn-green { background: var(--green); color: #000; }
.w-full { width: 100%; }
.intro-tabs { display: flex; gap: 8px; }
.itab { flex: 1; padding: 8px; border-radius: 4px; border: 1px solid var(--border); font-size: 11px; color: var(--text2); text-align: center; cursor: pointer; }
.itab.active { border-color: var(--ice); color: var(--ice); background: rgba(79,195,247,.08); }

/* ── TEAM SELECT ── */
#team-select {
  position: fixed; inset: 0; background: var(--bg); z-index: 90;
  display: flex; flex-direction: column;
}
.ts-header { padding: 20px 28px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.ts-title { font-family: var(--mono); font-size: 14px; color: var(--ice); letter-spacing: 2px; }
.ts-filters { display: flex; gap: 6px; }
.filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); font-size: 10px; color: var(--text2); cursor: pointer; }
.filter-btn.active { border-color: var(--ice); color: var(--ice); }
.ts-body { flex: 1; overflow-y: auto; padding: 20px 28px; }
.div-label { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 2px; margin: 16px 0 8px; text-transform: uppercase; }
.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
.team-tile {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
  padding: 12px 14px; cursor: pointer; display: flex; align-items: center; gap: 12px;
  transition: border-color 0.15s, background 0.15s;
}
.team-tile:hover { border-color: var(--ice); background: var(--bg3); }
.t-logo { width: 38px; height: 38px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 9px; font-weight: 700; flex-shrink: 0; }
.t-name { font-size: 12px; font-weight: 600; }
.t-cap { font-family: var(--mono); font-size: 9px; }
.cap-ok { color: var(--green); }
.cap-warn { color: var(--gold); }
.cap-tight { color: var(--red); }

/* ── APP SHELL ── */
#app { display: none; height: 100vh; flex-direction: column; }
#app.visible { display: flex; }
.top-bar {
  height: 48px; background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0;
}
.tb-logo { width: 30px; height: 30px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 9px; font-weight: 700; }
.tb-name { font-weight: 700; font-size: 13px; }
.tb-gm { font-size: 10px; color: var(--text2); }
.tb-cap { font-family: var(--mono); font-size: 10px; margin-left: auto; }
.cap-good { color: var(--green); } .cap-low { color: var(--gold); } .cap-over { color: var(--red); }
.tb-btn { padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); font-size: 10px; color: var(--text2); margin-left: 8px; }
.tb-btn:hover { border-color: var(--ice); color: var(--ice); }

.main { display: flex; flex: 1; overflow: hidden; }
.sidebar {
  width: 180px; background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 12px 8px; gap: 2px; flex-shrink: 0;
}
.nav-section { font-family: var(--mono); font-size: 9px; color: var(--text3); letter-spacing: 1px; padding: 8px 8px 4px; }
.nav-btn {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 5px;
  font-size: 12px; color: var(--text2); cursor: pointer; transition: all 0.12s; width: 100%;
}
.nav-btn:hover { background: var(--bg3); color: var(--text); }
.nav-btn.active { background: rgba(79,195,247,.12); color: var(--ice); }
.nav-icon { font-size: 14px; width: 18px; text-align: center; }
.content { flex: 1; overflow-y: auto; padding: 20px 24px; }
.view { display: none; }
.view.active { display: block; }
.view-title { font-family: var(--mono); font-size: 11px; color: var(--ice); letter-spacing: 2px; margin-bottom: 18px; text-transform: uppercase; }

/* ── PANELS & CARDS ── */
.panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 14px; }
.panel-title { padding: 10px 14px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 10px; color: var(--text2); letter-spacing: 1px; display: flex; align-items: center; justify-content: space-between; }
.panel-body { padding: 14px; }
.row { display: flex; align-items: center; gap: 10px; }
.row + .row { margin-top: 6px; }

/* ── TABLES ── */
.tbl { width: 100%; border-collapse: collapse; }
.tbl th { font-family: var(--mono); font-size: 9px; color: var(--text3); letter-spacing: 1px; padding: 5px 8px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 400; }
.tbl td { padding: 7px 8px; border-bottom: 1px solid rgba(30,36,45,.6); font-size: 12px; }
.tbl tr:hover td { background: rgba(79,195,247,.04); }
.tbl tr:last-child td { border-bottom: none; }
.mono { font-family: var(--mono); }
.text-dim { color: var(--text2); }
.text-muted { color: var(--text3); }
.badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 9px; font-family: var(--mono); font-weight: 600; }
.badge-ir { background: rgba(239,83,80,.15); color: var(--red); border: 1px solid rgba(239,83,80,.3); }
.badge-ahl { background: rgba(255,167,38,.12); color: var(--gold); border: 1px solid rgba(255,167,38,.25); }
.badge-ntc { background: rgba(79,195,247,.1); color: var(--ice); border: 1px solid rgba(79,195,247,.25); }
.rtg { display: inline-block; width: 30px; text-align: center; padding: 2px 0; border-radius: 3px; font-family: var(--mono); font-size: 10px; font-weight: 700; }
.rtg-high { background: rgba(102,187,106,.15); color: var(--green); }
.rtg-mid { background: rgba(255,167,38,.12); color: var(--gold); }
.rtg-low { background: rgba(239,83,80,.1); color: var(--red); }

/* ── TABS ── */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.tab { padding: 8px 16px; font-size: 11px; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.12s; }
.tab.active { color: var(--ice); border-bottom-color: var(--ice); }

/* ── TRADE BUILDER ── */
.trade-grid { display: grid; grid-template-columns: 1fr 60px 1fr; gap: 12px; align-items: start; }
.trade-side { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 12px; }
.trade-middle { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding-top: 40px; }
.trade-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; background: var(--bg2); border-radius: 4px; margin-bottom: 4px; font-size: 11px; }
.trade-item .rm { color: var(--red); cursor: pointer; font-size: 14px; line-height: 1; }

/* ── NEWS ── */
.news-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.news-item:last-child { border-bottom: none; }
.news-tag { font-family: var(--mono); font-size: 8px; padding: 2px 6px; border-radius: 3px; flex-shrink: 0; margin-top: 1px; font-weight: 700; letter-spacing: 0.5px; }
.tag-trade { background: rgba(79,195,247,.15); color: var(--ice); }
.tag-sign { background: rgba(102,187,106,.15); color: var(--green); }
.tag-injury { background: rgba(239,83,80,.15); color: var(--red); }
.tag-waive { background: rgba(255,167,38,.12); color: var(--gold); }
.tag-info { background: rgba(100,100,100,.15); color: var(--text2); }
.news-text { font-size: 11px; color: var(--text2); line-height: 1.5; }

/* ── MODAL ── */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 24px; min-width: 360px; max-width: 520px; }
.modal-title { font-family: var(--mono); font-size: 12px; color: var(--ice); letter-spacing: 1px; margin-bottom: 16px; }
.modal-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

/* ── TOAST ── */
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 10px 18px; font-size: 12px; z-index: 1000; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
#toast.show { opacity: 1; }

/* ── DASHBOARD ── */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; }
.stat-label { font-family: var(--mono); font-size: 9px; color: var(--text3); letter-spacing: 1px; margin-bottom: 6px; }
.stat-val { font-size: 22px; font-weight: 700; font-family: var(--mono); }
.stat-sub { font-size: 10px; color: var(--text2); margin-top: 2px; }

/* ── MISC ── */
.mb8 { margin-bottom: 8px; }
.mb12 { margin-bottom: 12px; }
.mb16 { margin-bottom: 16px; }
.flex { display: flex; }
.flex-1 { flex: 1; }
.gap8 { gap: 8px; }
.gap12 { gap: 12px; }
.text-right { text-align: right; }
.detail-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
.detail-row:last-child { border-bottom: none; }
.detail-key { color: var(--text2); }
select.sm { font-size: 11px; padding: 5px 8px; }
.color-stripe { height: 3px; border-radius: 0 0 6px 6px; }
.cap-bar { height: 4px; background: var(--border); border-radius: 2px; margin: 4px 0; }
.cap-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
.player-name-link { cursor: pointer; }
.player-name-link:hover { color: var(--ice); }
</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div id="loading-overlay">
  <div class="load-puck">🏒</div>
  <div class="load-title">NHL GM MODE</div>
  <div class="load-sub" id="load-msg">Connecting to NHL.com...</div>
  <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
  <div class="load-sub" id="load-count" style="font-size:10px">0 / 32 teams</div>
</div>

<!-- INTRO -->
<div id="intro" class="hidden">
  <div class="intro-logo">🏒 NHL</div>
  <div class="intro-title">GM <span>MODE</span></div>
  <div class="intro-season">2025 – 26 SEASON</div>
  <div class="intro-card">
    <div class="intro-tabs mb8">
      <div class="itab active" id="tab-solo" onclick="switchIntroTab('solo')">Solo GM</div>
      <div class="itab" id="tab-league" onclick="switchIntroTab('league')">League</div>
      <div class="itab" id="tab-load" onclick="switchIntroTab('load')">Continue</div>
    </div>
    <div id="pane-solo">
      <div class="inp-label">Your Name</div>
      <input id="inp-name" placeholder="Enter GM name..." value="GM" style="margin-bottom:12px">
      <button class="btn btn-ice w-full" onclick="startSolo()">START GAME</button>
    </div>
    <div id="pane-league" class="hidden">
      <div class="inp-label">Your Name</div>
      <input id="inp-lg-name" placeholder="Enter GM name..." style="margin-bottom:10px">
      <div class="inp-label">League Name</div>
      <input id="inp-lg-league" placeholder="Enter league name..." style="margin-bottom:12px">
      <button class="btn btn-ice w-full" onclick="startLeague()">CREATE LEAGUE</button>
    </div>
    <div id="pane-load" class="hidden">
      <div class="inp-label">Saved Games</div>
      <div id="saves-list" style="margin-bottom:12px"></div>
      <button class="btn btn-outline w-full" onclick="deleteSave()">🗑 Delete Save</button>
    </div>
  </div>
</div>

<!-- TEAM SELECT -->
<div id="team-select" class="hidden">
  <div class="ts-header">
    <div class="ts-title">SELECT YOUR TEAM</div>
    <div class="ts-filters">
      <div class="filter-btn active" onclick="confFilter('all',this)">All</div>
      <div class="filter-btn" onclick="confFilter('East',this)">East</div>
      <div class="filter-btn" onclick="confFilter('West',this)">West</div>
    </div>
  </div>
  <div class="ts-body" id="ts-body"></div>
</div>

<!-- APP -->
<div id="app">
  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="tb-logo" id="tb-logo">NHL</div>
    <div>
      <div class="tb-name" id="tb-name">Team</div>
      <div class="tb-gm" id="tb-gm">GM</div>
    </div>
    <div class="tb-cap" id="tb-cap"></div>
    <button class="tb-btn" onclick="switchTeam()">Switch Team</button>
    <button class="tb-btn" onclick="saveGame()">💾 Save</button>
  </div>
  <div class="main">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="nav-section">MANAGEMENT</div>
      <button class="nav-btn active" onclick="go('dashboard')"><span class="nav-icon">📊</span>War Room</button>
      <button class="nav-btn" onclick="go('roster')"><span class="nav-icon">🏒</span>Roster</button>
      <button class="nav-btn" onclick="go('ahl')"><span class="nav-icon">🌱</span>AHL Farm</button>
      <div class="nav-section">TRANSACTIONS</div>
      <button class="nav-btn" onclick="go('trades')"><span class="nav-icon">🔄</span>Trades</button>
      <button class="nav-btn" onclick="go('waivers')"><span class="nav-icon">📋</span>Waivers</button>
      <button class="nav-btn" onclick="go('fa')"><span class="nav-icon">✍️</span>Free Agents</button>
      <button class="nav-btn" onclick="go('contracts')"><span class="nav-icon">📝</span>Contracts</button>
      <div class="nav-section">LEAGUE</div>
      <button class="nav-btn" onclick="go('standings')"><span class="nav-icon">🏆</span>Standings</button>
      <button class="nav-btn" onclick="go('draft')"><span class="nav-icon">🎯</span>Draft</button>
      <button class="nav-btn" onclick="go('sim')"><span class="nav-icon">▶</span>Simulate</button>
    </div>
    <!-- CONTENT -->
    <div class="content">
      <div id="view-dashboard" class="view active"></div>
      <div id="view-roster" class="view"></div>
      <div id="view-ahl" class="view"></div>
      <div id="view-trades" class="view"></div>
      <div id="view-waivers" class="view"></div>
      <div id="view-fa" class="view"></div>
      <div id="view-contracts" class="view"></div>
      <div id="view-standings" class="view"></div>
      <div id="view-draft" class="view"></div>
      <div id="view-sim" class="view"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-bg" class="modal-bg hidden" onclick="if(event.target===this)closeModal()">
  <div id="modal-box" class="modal"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
'use strict';

// ── CORE HELPERS ───────────────────────────────────────────────
function $(id) { return document.getElementById(id); }

function fmt$(n) {
  if (!n && n !== 0) return 'N/A';
  const m = n / 1e6;
  return '$' + (m >= 1 ? m.toFixed(2) + 'M' : (n / 1e3).toFixed(0) + 'K');
}

function rtgClass(r) { return r >= 85 ? 'rtg-high' : r >= 73 ? 'rtg-mid' : 'rtg-low'; }

function toast(msg, type) {
  const t = $('toast');
  t.textContent = msg;
  t.style.borderColor = type === 'error' ? 'var(--red)' : type === 'success' ? 'var(--green)' : 'var(--border)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function closeModal() { $('modal-bg').classList.add('hidden'); }

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── CONSTANTS & GAME STATE ──────────────────────────────────────
const CAP = 95500000;

let GS = {
  team: null, gm: 'GM', league: null, leagueCode: null,
  news: [], mode: 'solo', standings: null,
};

function capUsed(abbr) {
  return (ROSTERS[abbr] || [])
    .filter(p => p.status === 'NHL' || p.status === 'IR' || p.status === 'LTIR')
    .reduce((s, p) => s + (p.cap || 0), 0);
}

function addNews(tag, cls, text) {
  GS.news.unshift({ tag, cls, text, time: new Date().toLocaleDateString() });
  if (GS.news.length > 60) GS.news.pop();
}

// ──────────────────────────────────────────────────────────────
//  TEAM DATA
// ──────────────────────────────────────────────────────────────
const TEAMS = {
  ANA:{name:"Anaheim Ducks",    c1:"#F47A38",c2:"#B9975B",ahl:"San Diego Gulls",   ovr:74,conf:"West",div:"Pacific"},
  BOS:{name:"Boston Bruins",    c1:"#FFB81C",c2:"#000000",ahl:"Providence Bruins", ovr:82,conf:"East",div:"Atlantic"},
  BUF:{name:"Buffalo Sabres",   c1:"#003087",c2:"#FCB514",ahl:"Rochester Americans",ovr:79,conf:"East",div:"Atlantic"},
  CAR:{name:"Carolina Hurricanes",c1:"#CC0000",c2:"#FFFFFF",ahl:"Chicago Wolves",  ovr:86,conf:"East",div:"Metropolitan"},
  CBJ:{name:"Columbus Blue Jackets",c1:"#002654",c2:"#CE1126",ahl:"Cleveland Monsters",ovr:77,conf:"East",div:"Metropolitan"},
  CGY:{name:"Calgary Flames",   c1:"#C8102E",c2:"#F1BE48",ahl:"Calgary Wranglers", ovr:75,conf:"West",div:"Pacific"},
  CHI:{name:"Chicago Blackhawks",c1:"#CF0A2C",c2:"#000000",ahl:"Rockford IceHogs", ovr:74,conf:"West",div:"Central"},
  COL:{name:"Colorado Avalanche",c1:"#6F263D",c2:"#236192",ahl:"Colorado Eagles",  ovr:92,conf:"West",div:"Central"},
  DAL:{name:"Dallas Stars",     c1:"#006847",c2:"#8F8F8C",ahl:"Texas Stars",       ovr:89,conf:"West",div:"Central"},
  DET:{name:"Detroit Red Wings",c1:"#CE1126",c2:"#FFFFFF",ahl:"Grand Rapids Griffins",ovr:82,conf:"East",div:"Atlantic"},
  EDM:{name:"Edmonton Oilers",  c1:"#FF4C00",c2:"#003087",ahl:"Bakersfield Condors",ovr:88,conf:"West",div:"Pacific"},
  FLA:{name:"Florida Panthers", c1:"#041E42",c2:"#C8102E",ahl:"Charlotte Checkers",ovr:84,conf:"East",div:"Atlantic"},
  LAK:{name:"Los Angeles Kings",c1:"#111111",c2:"#A2AAAD",ahl:"Ontario Reign",     ovr:78,conf:"West",div:"Pacific"},

// ──────────────────────────────────────────────────────────────
//  STARTUP
// ──────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Skip live loading — rosters are hardcoded from NHL.com projected lineups
  $('loading-overlay').classList.add('hidden');
  checkForSave();
});

function checkForSave() {
  const save = localStorage.getItem('gm-mode-save');
  $('intro').classList.remove('hidden');
  if (save) {
    try {
      const d = JSON.parse(save);
      $('saves-list').innerHTML = `
        <div class="detail-row" style="cursor:pointer" onclick="loadSave()">
          <span>${d.team ? TEAMS[d.team]?.name || d.team : 'Unknown'}</span>
          <span class="text-dim">GM: ${d.gm}</span>
        </div>`;
    } catch(e) {}
  } else {
    $('saves-list').innerHTML = '<div class="text-muted" style="font-size:11px;padding:8px 0">No saved games found.</div>';
  }
}

function switchIntroTab(tab) {
  ['solo','league','load'].forEach(t => {
    $('tab-'+t).classList.toggle('active', t === tab);
    $('pane-'+t).classList.toggle('hidden', t !== tab);
  });
}

function startSolo() {
  const name = $('inp-name').value.trim();
  if (!name) { toast('Enter your GM name', 'error'); return; }
  GS.gm = name; GS.mode = 'solo';
  $('intro').classList.add('hidden');
  showTeamSelect();
}

function startLeague() {
  const name = $('inp-lg-name').value.trim();
  const league = $('inp-lg-league').value.trim();
  if (!name || !league) { toast('Fill in all fields', 'error'); return; }
  GS.gm = name; GS.mode = 'league'; GS.league = league;
  GS.leagueCode = Math.random().toString(36).slice(2,8).toUpperCase();
  $('intro').classList.add('hidden');
  showTeamSelect();
}

function loadSave() {
  try {
    const d = JSON.parse(localStorage.getItem('gm-mode-save'));
    Object.assign(GS, d);
    $('intro').classList.add('hidden');
    pickTeam(GS.team, true);
  } catch(e) { toast('Failed to load save', 'error'); }
}

function deleteSave() {
  localStorage.removeItem('gm-mode-save');
  $('saves-list').innerHTML = '<div class="text-muted" style="font-size:11px;padding:8px 0">No saved games found.</div>';
  toast('Save deleted');
}

function saveGame() {
  try {
    localStorage.setItem('gm-mode-save', JSON.stringify(GS));
    toast('Game saved ✓', 'success');
  } catch(e) { toast('Save failed', 'error'); }
}

// ──────────────────────────────────────────────────────────────
//  TEAM SELECT
// ──────────────────────────────────────────────────────────────
function showTeamSelect() {
  $('team-select').classList.remove('hidden');
  buildTeamGrid('all');
}

function confFilter(conf, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildTeamGrid(conf);
}

function buildTeamGrid(conf) {
  const divGroups = {
    East: [
      ['Atlantic',     ['BOS','BUF','DET','FLA','MTL','OTT','TBL','TOR']],
      ['Metropolitan', ['CAR','CBJ','NJD','NYI','NYR','PHI','PIT','WSH']],
    ],
    West: [
      ['Central', ['CHI','COL','DAL','MIN','NSH','STL','UTA','WPG']],
      ['Pacific', ['ANA','CGY','EDM','LAK','SJS','SEA','VAN','VGK']],
    ],
  };
  let groups = conf === 'East' ? divGroups.East :
               conf === 'West' ? divGroups.West :
               [...divGroups.East, ...divGroups.West];

  $('ts-body').innerHTML = groups.map(([div, teams]) => `
    <div class="div-label">${div} Division</div>
    <div class="team-grid mb16">
      ${teams.map(abbr => {
        const t = TEAMS[abbr]; if (!t) return '';
        const used  = capUsed(abbr);
        const space = CAP - used;
        const pct   = used / CAP;
        const cls   = pct > 0.95 ? 'cap-tight' : pct > 0.85 ? 'cap-warn' : 'cap-ok';
        const spaceTxt = (space >= 0 ? '+' : '') + fmt$(space);
        const roster = ROSTERS[abbr] || [];
        const nhlPlayers = roster.filter(p => p.status === 'NHL').length;
        return `<div class="team-tile" onclick="pickTeam('${abbr}')">
          <div class="t-logo" style="background:${t.c1};color:${t.c2}">${abbr}</div>
          <div style="flex:1;min-width:0">
            <div class="t-name">${t.name}</div>
            <div style="font-size:9px;color:var(--text3);margin-top:2px">${nhlPlayers} NHL players</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
            <span style="font-family:var(--mono);font-size:10px;color:var(--text2)">OVR ${t.ovr}</span>
            <span class="t-cap ${cls}">${spaceTxt}</span>
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

function pickTeam(abbr, fromSave) {
  const t = TEAMS[abbr];
  if (!t) { toast('Team not found', 'error'); return; }
  GS.team = abbr;
  $('team-select').classList.add('hidden');

  // Setup top bar
  $('tb-logo').textContent = abbr;
  $('tb-logo').style.background = t.c1;
  $('tb-logo').style.color = t.c2;
  $('tb-name').textContent = t.name;
  $('tb-gm').textContent   = `GM: ${GS.gm}`;

  $('app').classList.add('visible');
  updateCap();
  go('dashboard');

  if (!fromSave) {
    addNews('HIRED', 'tag-sign', `${GS.gm} named General Manager of the ${t.name}.`);
    GS.simPhase='preseason'; GS.week=1; GS.schedule=[]; GS.results=[]; GS.injuries=[];
    initStandings(); generateSchedule();
  }
}

function switchTeam() {
  $('app').classList.remove('visible');
  showTeamSelect();
}

function updateCap() {
  const abbr = GS.team;
  const used = capUsed(abbr);
  const space = CAP - used;
  const pct = used / CAP;
  const cls = pct > 0.97 ? 'cap-over' : pct > 0.9 ? 'cap-low' : 'cap-good';
  $('tb-cap').innerHTML = `<span class="${cls}">${fmt$(used)} / ${fmt$(CAP)}</span> <span class="text-muted">(${fmt$(space)} space)</span>`;
}

//  NAVIGATION

let currentView = 'dashboard';

function go(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const el = $('view-' + view);
  if (el) el.classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => {
    if (b.getAttribute('onclick') === `go('${view}')`) b.classList.add('active');
  });
  currentView = view;
  const renders = {
    dashboard: renderDash, roster: renderRoster, ahl: renderAHL,
    trades: renderTrades, waivers: renderWaivers, fa: renderFA,
    contracts: renderContracts, standings: renderStandings, draft: renderDraft, sim: renderSim,
  };
  if (renders[view]) renders[view]();
}

function renderDash() {
  const abbr   = GS.team;

  const forwards  = roster.filter(p => ['LW','RW','C','F'].includes(p.pos));
  const defense   = roster.filter(p => p.pos === 'D');

  // Top scorer
  const top = [...roster].sort((a,b) => (b.pts||0) - (a.pts||0))[0];

  const earner = [...roster].sort((a,b) => (b.cap||0) - (a.cap||0))[0];

  const html = `
    <div class="view-title">WAR ROOM — ${t.name.toUpperCase()}</div>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">CAP USED</div>

        <div class="cap-bar"><div class="cap-fill" style="width:${pct}%;background:${capCls}"></div></div>
        <div class="stat-sub">${fmt$(space)} available (${100-pct}%)</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ROSTER</div>
        <div class="stat-val">${roster.length}</div>
        <div class="stat-sub">${forwards.length}F / ${defense.length}D / ${goalies.length}G</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">TOP SCORER</div>
        <div class="stat-val" style="font-size:14px">${top?.name.split(' ').pop() || '—'}</div>
        <div class="stat-sub">${top ? `${top.pts} PTS (${top.g}G ${top.a}A) in ${top.gp}GP` : 'Loading...'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">HIGHEST PAID</div>
        <div class="stat-val" style="font-size:14px">${earner?.name.split(' ').pop() || '—'}</div>
        <div class="stat-sub">${earner ? fmt$(earner.cap) + '/yr' : 'Loading...'}</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="panel">
        <div class="panel-title">DEPTH CHART</div>
        <div class="panel-body" style="padding:8px 0">
          ${[...forwards.slice(0,9), ...defense.slice(0,6), ...goalies.slice(0,2)].map(p => `
            <div style="display:flex;align-items:center;gap:8px;padding:5px 14px;border-bottom:1px solid var(--border)">
              <span class="mono text-muted" style="font-size:9px;width:18px">${p.pos}</span>
              <span style="flex:1;font-size:11px">${p.name}</span>
              <span class="rtg badge ${rtgClass(p.rtg||75)}">${p.rtg||75}</span>
              ${p.cap > 0 ? `<span class="mono text-muted" style="font-size:9px">${fmt$(p.cap)}</span>` : ''}
              ${p.status === 'IR' ? `<span class="badge badge-ir">IR</span>` : ''}
            </div>`).join('') || '<div class="text-muted" style="padding:14px;font-size:11px">Loading roster...</div>'}
        </div>
      </div>
      <div>
        <div class="panel">
          <div class="panel-title">RECENT NEWS <button class="btn btn-outline" style="font-size:9px;padding:2px 8px" onclick="triggerEvent()">+ Event</button></div>
          <div class="panel-body">
            ${GS.news.length ? GS.news.slice(0,8).map(n => `
              <div class="news-item">
                <div class="news-tag ${n.cls}">${n.tag}</div>
                <div class="news-text">${n.text}</div>
              </div>`).join('') : '<div class="text-muted" style="font-size:11px">No news yet.</div>'}

        </div>

              <div style="display:flex;align-items:center;gap:8px;padding:5px 14px">
                <span style="flex:1;font-size:11px">${p.name}</span>
                <span class="badge ${p.status==='LTIR'?'badge-ir':'badge-ir'}">${p.status}</span>
              </div>`).join('') || '<div class="text-muted" style="padding:8px 14px;font-size:11px">No injured players.</div>'}

        </div>

  $('view-dashboard').innerHTML = html;

      </tr></thead>

          <tr>
            <td><span class="player-name-link" onclick="showPlayerModal('${p.id}','${abbr}')">${p.name}</span></td>
            <td class="mono text-muted">${p.pos}</td>

            <td><span class="rtg badge ${rtgClass(p.rtg||75)}">${p.rtg||75}</span></td>
            <td class="mono">${p.gp||0}</td>

          </tr>`).join('')}

  $('view-roster').innerHTML = `
    <div class="view-title">ROSTER</div>

  addNews('INJURY', 'tag-injury', `${p.name} placed on injured reserve.`);

let tradeState = {
  myItems: [],   // {type:'player'|'pick', id, abbr, label}
  theirItems: [],
  targetTeam: Object.keys(TEAMS).filter(a=>a!=='BOS')[0],
};

function renderTrades() {
  const myAbbr  = GS.team;
  const t1      = TEAMS[myAbbr];
  const theirAbbr = tradeState.targetTeam;
  const t2      = TEAMS[theirAbbr] || TEAMS[Object.keys(TEAMS)[0]];

  $('view-trades').innerHTML = `
    <div class="view-title">TRADE CENTER</div>
    <div class="panel mb12">
      <div class="panel-body">
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:11px;color:var(--text2)">Trading with:</span>
          <select class="sm" onchange="tradeState.targetTeam=this.value;renderTrades()">
            ${Object.keys(TEAMS).filter(a=>a!==myAbbr).map(a=>`
              <option value="${a}" ${a===theirAbbr?'selected':''}>${TEAMS[a].name}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>

    <div class="trade-grid">
      <div class="trade-side">
        <div style="font-family:var(--mono);font-size:10px;color:var(--ice);margin-bottom:10px;letter-spacing:1px">${t1.name.toUpperCase()}</div>
        <div id="my-trade-items">
          ${tradeState.myItems.map((item,i)=>`
            <div class="trade-item">
              <span>${item.label}</span>
              <span class="rm" onclick="tradeState.myItems.splice(${i},1);renderTrades()">×</span>
            </div>`).join('') || '<div class="text-muted" style="font-size:10px;padding:4px 0">No items added</div>'}
        </div>
        <div style="margin-top:12px">
          <div style="font-size:10px;color:var(--text2);margin-bottom:6px">ADD FROM ROSTER:</div>
          <select class="sm w-full" id="my-player-pick" style="width:100%;margin-bottom:6px">
            <option value="">— Select player —</option>
            ${(ROSTERS[myAbbr]||[]).filter(p=>p.status==='NHL').map(p=>`<option value="p:${p.id}:${p.name}">${p.name} (${p.pos})</option>`).join('')}
            <option value="pick:1st:2026 1st Round Pick">2026 1st Round Pick</option>
            <option value="pick:2nd:2026 2nd Round Pick">2026 2nd Round Pick</option>
            <option value="pick:3rd:2026 3rd Round Pick">2026 3rd Round Pick</option>
          </select>
          <button class="btn btn-outline" style="font-size:10px;padding:4px 10px" onclick="addTradeItem('my')">Add to Trade</button>
        </div>
      </div>

      <div class="trade-middle">
        <div style="font-size:28px">⇄</div>
        <button class="btn btn-ice" style="font-size:10px;padding:6px 12px" onclick="proposeTrade()">PROPOSE</button>
        <button class="btn btn-outline" style="font-size:9px;padding:4px 8px" onclick="clearTrade()">Clear</button>
      </div>

      <div class="trade-side">
        <div style="font-family:var(--mono);font-size:10px;color:var(--ice);margin-bottom:10px;letter-spacing:1px">${t2.name.toUpperCase()}</div>
        <div id="their-trade-items">
          ${tradeState.theirItems.map((item,i)=>`
            <div class="trade-item">
              <span>${item.label}</span>
              <span class="rm" onclick="tradeState.theirItems.splice(${i},1);renderTrades()">×</span>
            </div>`).join('') || '<div class="text-muted" style="font-size:10px;padding:4px 0">No items added</div>'}
        </div>

            ${(ROSTERS[theirAbbr]||[]).filter(p=>p.status==='NHL').map(p=>`<option value="p:${p.id}:${p.name}">${p.name} (${p.pos})</option>`).join('')}
            <option value="pick:1st:2026 1st Round Pick">2026 1st Round Pick</option>
            <option value="pick:2nd:2026 2nd Round Pick">2026 2nd Round Pick</option>
            <option value="pick:3rd:2026 3rd Round Pick">2026 3rd Round Pick</option>
          </select>
          <button class="btn btn-outline" style="font-size:10px;padding:4px 10px" onclick="addTradeItem('their')">Add to Trade</button>
        </div>
      </div>

function addTradeItem(side) {
  const sel = $(side === 'my' ? 'my-player-pick' : 'their-player-pick');
  if (!sel.value) return;
  const parts = sel.value.split(':');
  const abbr  = side === 'my' ? GS.team : tradeState.targetTeam;
  const item  = { abbr, type: parts[0], id: parts[1], label: parts[2] || parts[1] };
  if (side === 'my') tradeState.myItems.push(item);
  else tradeState.theirItems.push(item);
  renderTrades();
}

function clearTrade() {
  tradeState.myItems = []; tradeState.theirItems = [];
  renderTrades();
}

function proposeTrade() {
  if (!tradeState.myItems.length && !tradeState.theirItems.length) {
    toast('Add items to the trade first', 'error'); return;
  }

  // Simple AI acceptance logic based on value comparison
  const myVal   = tradeState.myItems.reduce((s,item) => {
    if (item.type === 'p') {
      const p = (ROSTERS[GS.team]||[]).find(x=>x.id===item.id);
      return s + (p?.rtg||70);
    }
    return s + (item.id==='1st'?65:item.id==='2nd'?55:45);
  }, 0);
  const theirVal = tradeState.theirItems.reduce((s,item) => {
    if (item.type === 'p') {
      const p = (ROSTERS[tradeState.targetTeam]||[]).find(x=>x.id===item.id);
      return s + (p?.rtg||70);
    }
    return s + (item.id==='1st'?65:item.id==='2nd'?55:45);
  }, 0);

  const ratio   = myVal > 0 ? theirVal / myVal : 0;
  const accepted = ratio >= 0.85 && ratio <= 1.3 && Math.random() > 0.25;

  if (!accepted) {
    toast(`${TEAMS[tradeState.targetTeam].name} rejected the trade offer`, 'error');
    addNews('REJECTED', 'tag-trade', `Trade proposal rejected by the ${TEAMS[tradeState.targetTeam].name}.`);
    return;
  }

  // Execute trade
  tradeState.myItems.forEach(item => {
    if (item.type === 'p') {
      const p = (ROSTERS[GS.team]||[]).find(x=>x.id===item.id);
      if (p) {
        const newP = { ...p, id: `${tradeState.targetTeam}_${p._nhlId||p.id}`, status:'NHL' };
        (ROSTERS[tradeState.targetTeam] = ROSTERS[tradeState.targetTeam]||[]).push(newP);
        p.status = 'TRADED';
      }
    }
  });
  tradeState.theirItems.forEach(item => {
    if (item.type === 'p') {
      const p = (ROSTERS[tradeState.targetTeam]||[]).find(x=>x.id===item.id);
      if (p) {
        const newP = { ...p, id: `${GS.team}_${p._nhlId||p.id}`, status:'NHL' };
        (ROSTERS[GS.team] = ROSTERS[GS.team]||[]).push(newP);
        p.status = 'TRADED';
      }
    }
  });

  const myNames   = tradeState.myItems.map(i=>i.label).join(', ');
  const theirNames = tradeState.theirItems.map(i=>i.label).join(', ');
  toast('Trade accepted! 🎉', 'success');
  addNews('TRADE', 'tag-trade', `${TEAMS[GS.team].name} trades ${myNames||'picks'} to ${TEAMS[tradeState.targetTeam].name} for ${theirNames||'picks'}.`);
  clearTrade();
  updateCap();
}

// ══════════════════════════════════════════════════════════════════
//  DRAFT SYSTEM — NHL Lottery + 7-Round Snake Draft
// ══════════════════════════════════════════════════════════════════

// Real NHL lottery odds per 1,000 combinations (seeds 1-16, worst to best)
const LOTTERY_ODDS = [185, 135, 115, 95, 85, 75, 65, 60, 50, 35, 30, 25, 20, 15, 5, 5];

// Draft state
let DRAFT = {
  active:       false,   // is draft in progress?
  order:        [],      // final pick order [abbr, abbr, ...] length 224 (32×7)
  lotteryDone:  false,
  lotteryAnim:  [],      // animation frames for lottery reveal
  currentPick:  0,       // index into order[] for user's current selection
  picks:        {},      // picks[pickNum] = { team, player } or null
  prospects:    [],      // generated prospect pool
  userPicks:    [],      // pick numbers where user picks
  aiDone:       new Set(), // pick indices already made
};

// ── Prospect pool generator ───────────────────────────────────
const PROSPECT_FIRST = ['Luca','Ethan','Matej','Cole','Blake','Axel','Theo','Emil','Niko',
  'Owen','Jack','Finn','Lukas','Max','Oliver','Felix','Anton','Hugo','Simon','Leon',
  'Patrik','Ryder','Brady','Chase','Carter','Hunter','Mason','Logan','Dylan','Aiden'];
const PROSPECT_LAST  = ['Andersson','Johansson','Novak','MacLeod','Sullivan','Bergstrom',
  'Karlsson','Schmidt','Petrov','Leblanc','Morrison','Nielsen','Walsh','Kowalski','Dubois',
  'Lindqvist','Hansen','Persson','Kozlov','Belanger','Eriksson','Fortin','Cormier','Ricci',
  'Fontaine','Bergeron','Tremblay','Gagnon','Lavoie','Poulin'];
const PROSPECT_POS   = ['C','LW','RW','D','D','G'];
const PROSPECT_TEAMS = [
  'Boston College','Michigan','Minnesota','Wisconsin','Denver','Providence',
  'Quebec (QMJHL)','Saginaw (OHL)','Windsor (OHL)','Portland (WHL)',
  'Everett (WHL)','Djurgarden (SHL)','Frolunda (SHL)','Skelleftea (SHL)',
  'Trinec (Czech)','Ocelari (Czech)','Jokerit (Liiga)','TPS (Liiga)',
  'SKA St. Petersburg','CSKA Moscow','USNTDP','U.S. U18','Team Canada U18',
];

function generateProspects(n) {
  const used = new Set();
  const pool = [];
  for (let i = 0; i < n; i++) {
    let name;
    do {
      const f = PROSPECT_FIRST[Math.floor(Math.random()*PROSPECT_FIRST.length)];
      const l = PROSPECT_LAST [Math.floor(Math.random()*PROSPECT_LAST.length)];
      name = f + ' ' + l;
    } while (used.has(name));
    used.add(name);
    const pos   = PROSPECT_POS[Math.floor(Math.random()*PROSPECT_POS.length)];
    const team  = PROSPECT_TEAMS[Math.floor(Math.random()*PROSPECT_TEAMS.length)].trim();
    // Rating drops off by round — 1st round 78-92, 2nd 70-82, etc.
    const baseRtg = Math.max(55, 93 - Math.floor(i / 32) * 8 - Math.floor(Math.random()*8));
    pool.push({
      id:     'p_' + i,
      name,
      pos,
      team,
      age:    17 + Math.floor(Math.random()*3),
      rtg:    baseRtg,
      picked: false,
    });
  }
  return pool;
}

// ── Build draft order via NHL lottery rules ───────────────────
function runLottery() {
  // Get all 32 teams sorted by points (worst first)
  const allTeams = Object.keys(TEAMS).sort((a,b) =>
    (GS.standings[a]?.pts||0) - (GS.standings[b]?.pts||0)
  );

  // Split into non-playoff (bottom 16 by pts) and playoff teams
  // Actual: 16 non-playoff teams. We'll use bottom 16 by pts.
  const nonPlayoff = allTeams.slice(0, 16);   // worst 16
  const playoffs   = allTeams.slice(16);       // best 16

  // Weighted lottery — assign combinations pool
  const pool = [];
  nonPlayoff.forEach((team, idx) => {
    const combos = LOTTERY_ODDS[idx] || 5;
    for (let c = 0; c < combos; c++) pool.push({ team, seed: idx + 1 });
  });

  // Shuffle pool
  pool.sort(() => Math.random() - 0.5);

  // DRAW 1 — Pick #1
  let draw1 = pool[Math.floor(Math.random() * pool.length)];
  // Max 10-spot jump: if seed > 11, clamp winner to seed-10 position
  // and give #1 to worst team
  let pick1Team, lotteryWinner1 = draw1.team, lotteryWinner1Seed = draw1.seed;
  if (draw1.seed > 11) {
    pick1Team = nonPlayoff[0]; // worst team guaranteed #1
  } else {
    pick1Team = draw1.team;
  }

  // DRAW 2 — Pick #2 (excluding pick1Team)
  const pool2 = pool.filter(c => c.team !== pick1Team);
  pool2.sort(() => Math.random() - 0.5);
  let draw2 = pool2[Math.floor(Math.random() * pool2.length)];
  let pick2Team, lotteryWinner2Seed = draw2.seed;
  if (draw2.seed > 11) {
    // Move up max 10: find the team that would be at seed-10 after pick1 removed
    const remaining = nonPlayoff.filter(t => t !== pick1Team);
    pick2Team = remaining[Math.min(draw2.seed - 11, remaining.length - 1)];
  } else {
    pick2Team = draw2.team;
  }

  // Remaining lottery teams in reverse-standings order (picks 3-16)
  const remaining = nonPlayoff.filter(t => t !== pick1Team && t !== pick2Team);

  // Picks 17-32: playoff teams, sorted by elimination order
  // (worst record first — simplify as reverse of pts)
  const playoffSorted = [...playoffs].sort((a,b) =>
    (GS.standings[a]?.pts||0) - (GS.standings[b]?.pts||0)
  );

  // Build round 1 order
  const round1 = [pick1Team, pick2Team, ...remaining, ...playoffSorted];

  // Build full 7-round order (rounds 2-7 = full reverse standings)
  const fullOrder = [...round1];
  const allByPts = [...allTeams]; // already sorted worst→best
  for (let round = 2; round <= 7; round++) {
    allByPts.forEach(t => fullOrder.push(t));
  }

  // Store lottery animation metadata
  DRAFT.lotteryAnim = [
    { pick: 1, winner: pick1Team, winnerSeed: lotteryWinner1Seed, drawnTeam: lotteryWinner1 },
    { pick: 2, winner: pick2Team, winnerSeed: lotteryWinner2Seed, drawnTeam: draw2.team },
  ];

  DRAFT.order       = fullOrder;
  DRAFT.lotteryDone = true;
  DRAFT.picks       = {};
  DRAFT.prospects   = generateProspects(fullOrder.length + 20);
  DRAFT.active      = true;
  DRAFT.currentPick = 0;
  DRAFT.aiDone      = new Set();

  // Find all picks belonging to user's team
  DRAFT.userPicks = fullOrder
    .map((t, i) => t === GS.team ? i : -1)
    .filter(i => i >= 0);

  // AI makes all picks before the user's first pick automatically
  runAIPicks();
}

// ── AI auto-picks for all non-user picks ─────────────────────
function runAIPicks() {
  const nextUserPick = DRAFT.userPicks.find(i => !DRAFT.picks[i]);
  const limit = nextUserPick !== undefined ? nextUserPick : DRAFT.order.length;

  for (let i = DRAFT.currentPick; i < limit; i++) {
    if (DRAFT.picks[i] || DRAFT.aiDone.has(i)) continue;
    const team = DRAFT.order[i];
    if (team === GS.team) break;

    // AI picks best available prospect for position need
    const available = DRAFT.prospects.filter(p => !p.picked);
    if (!available.length) break;

    // Simple need assessment
    const roster = ROSTERS[team] || [];
    const posCount = {};
    roster.forEach(p => { posCount[p.pos] = (posCount[p.pos]||0)+1; });
    // Score prospects: best rating + slight bonus for needed positions
    const scored = available.map(p => {
      let score = p.rtg;
      if ((posCount[p.pos]||0) < 3) score += 5;
      return { p, score };
    });
    scored.sort((a,b) => b.score - a.score);
    const picked = scored[0].p;
    picked.picked = true;
    DRAFT.picks[i] = { team, player: picked };
    DRAFT.aiDone.add(i);
    if (i >= DRAFT.currentPick) DRAFT.currentPick = i + 1;
  }
}

// ── User makes a pick ─────────────────────────────────────────
function userPick(prospectId) {
  const nextPick = DRAFT.userPicks.find(i => !DRAFT.picks[i]);
  if (nextPick === undefined) return;

  const prospect = DRAFT.prospects.find(p => p.id === prospectId && !p.picked);
  if (!prospect) { toast('Player already taken', 'error'); return; }

  prospect.picked = true;
  DRAFT.picks[nextPick] = { team: GS.team, player: prospect };
  DRAFT.aiDone.add(nextPick);
  DRAFT.currentPick = nextPick + 1;

  // Add to user's roster
  const newPlayer = {
    id:       GS.team + '_draft_' + prospect.id,
    name:     prospect.name,
    pos:      prospect.pos,
    age:      prospect.age,
    cap:      925000,
    yrs:      3,
    ntc:      false,
    ntc_type: null,
    rtg:      prospect.rtg,
    status:   'AHL',
    g:0, a:0, pts:0, gp:0,
  };
  ROSTERS[GS.team].push(newPlayer);

  const round = Math.floor(nextPick / 32) + 1;
  const pickInRound = (nextPick % 32) + 1;
  addNews('DRAFTED','tag-sign',
    `${GS.team} selects ${prospect.name} (${prospect.pos}) with pick #${nextPick+1} (Round ${round}, Pick ${pickInRound}).`);
  toast(`${prospect.name} selected!`, 'success');

  // AI picks until next user pick
  runAIPicks();
  renderDraft();
}

// ── Advance past a user pick (skip) ──────────────────────────
function skipPick() {
  const nextPick = DRAFT.userPicks.find(i => !DRAFT.picks[i]);
  if (nextPick === undefined) return;
  // AI takes it
  const available = DRAFT.prospects.filter(p => !p.picked);
  if (available.length) {
    const picked = available[0];
    picked.picked = true;
    DRAFT.picks[nextPick] = { team: GS.team, player: picked };
    DRAFT.aiDone.add(nextPick);
    DRAFT.currentPick = nextPick + 1;
  }
  runAIPicks();
  renderDraft();
}

// ══════════════════════════════════════════════════════════════════
//  SIMULATION ENGINE
// ══════════════════════════════════════════════════════════════════

const NUM_WEEKS = 26;

// Extend GS with sim fields on first run
function ensureSimState() {
  if (!GS.simPhase)    GS.simPhase    = 'preseason';
  if (!GS.week)        GS.week        = 1;
  if (!GS.schedule)    GS.schedule    = [];
  if (!GS.results)     GS.results     = [];
  if (!GS.injuries)    GS.injuries    = [];
  if (!GS.playoffState) GS.playoffState = null;
}

function initStandings() {
  GS.standings = {};
  Object.keys(TEAMS).forEach(a => {
    GS.standings[a] = { gp:0, w:0, l:0, otl:0, pts:0, gf:0, ga:0 };
  });
}

// ── Team strength 55–99 ───────────────────────────────────────
function teamStrength(abbr) {
  const roster = (ROSTERS[abbr] || []).filter(p => p.status === 'NHL');
  if (!roster.length) return TEAMS[abbr]?.ovr || 75;
  const fwd  = roster.filter(p => ['LW','RW','C','F'].includes(p.pos));
  const def  = roster.filter(p => p.pos === 'D');
  const goal = roster.filter(p => p.pos === 'G');
  const avg  = arr => arr.length ? arr.reduce((s,p)=>s+(p.rtg||75),0)/arr.length : 75;
  return Math.round(avg(fwd)*0.45 + avg(def)*0.30 + avg(goal)*0.25);
}

// ── Schedule builder ──────────────────────────────────────────
function generateSchedule() {
  // 32 teams × 82 games / 2 = 1312 total unique matchups
  const teams = Object.keys(TEAMS);
  const divMap = {};
  teams.forEach(a => { const d = TEAMS[a].div; (divMap[d] = divMap[d] || []).push(a); });

  const games = [];
  const pairCount = {}; // how many times pair A-B has been scheduled

  function addGame(home, away) {
    const key = [home, away].sort().join('|');
    pairCount[key] = (pairCount[key] || 0) + 1;
    games.push({ home, away });
  }

  // Each team: 6 vs each div rival, rest vs others — but only schedule HOME games
  // to avoid duplication (away games come from the opponent's home schedule)
  teams.forEach(home => {
    const divRivals = (divMap[TEAMS[home].div] || []).filter(a => a !== home);
    const others    = teams.filter(a => a !== home && !divRivals.includes(a));

    // 3 home games vs each div rival (3 away handled when rival iterates)
    divRivals.forEach(away => {
      for (let i = 0; i < 3; i++) addGame(home, away);
    });

    // ~20 home games vs non-div
    const pool = [...others, ...others].sort(() => Math.random() - 0.5);
    for (let i = 0; i < 20; i++) addGame(home, pool[i % pool.length]);
  });

  // Shuffle then assign weeks
  games.sort(() => Math.random() - 0.5);

  // Count games per team
  const teamWeekGames = {};
  teams.forEach(a => { teamWeekGames[a] = Array(NUM_WEEKS + 1).fill(0); });

  const schedule = [];
  games.forEach(({ home, away }) => {
    // Find lowest week where both teams have room (max 4 games/week)
    let placed = false;
    for (let w = 1; w <= NUM_WEEKS; w++) {
      if (teamWeekGames[home][w] < 4 && teamWeekGames[away][w] < 4) {
        schedule.push({ home, away, week: w });
        teamWeekGames[home][w]++;
        teamWeekGames[away][w]++;
        placed = true;
        break;
      }
    }
    if (!placed) {
      schedule.push({ home, away, week: NUM_WEEKS });
    }
  });

  GS.schedule = schedule;
}


// ── Simulate one game ─────────────────────────────────────────
function simGame(home, away) {
  const hs = teamStrength(home) + 4 + Math.random() * 10; // home ice
  const as = teamStrength(away)     + Math.random() * 10;
  const total = Math.floor(Math.random() * 4) + 4; // 4-7 goals
  let hg = Math.round(total * hs / (hs + as));
  let ag = total - hg;
  if (hg === ag) Math.random() < 0.5 ? hg++ : ag++;
  if (hg > ag) return { w:home, l:away, wg:hg, lg:ag, ot:false };
  const ot = Math.random() < 0.22;
  return { w:away, l:home, wg:ag, lg:hg, ot };
}

// ── Apply result to standings ─────────────────────────────────
function applyResult(r) {
  const ws = GS.standings[r.w];
  const ls = GS.standings[r.l];
  if (!ws || !ls) return;
  ws.gp++; ws.w++; ws.pts += 2; ws.gf += r.wg; ws.ga += r.lg;
  ls.gp++; ls[r.ot ? 'otl' : 'l']++; if (r.ot) ls.pts++; ls.gf += r.lg; ls.ga += r.wg;
}

// ── Distribute stats to players ───────────────────────────────
function accrueStats(abbr, won) {
  const nhl  = (ROSTERS[abbr] || []).filter(p => p.status === 'NHL');
  const fwd  = nhl.filter(p => ['LW','RW','C','F'].includes(p.pos));
  const def  = nhl.filter(p => p.pos === 'D');
  const goal = nhl.filter(p => p.pos === 'G');
  nhl.forEach(p => { p.gp = (p.gp || 0) + 1; });
  const scorers = [...fwd, ...def.slice(0, 3)];
  if (!scorers.length) return;
  const weights = scorers.map(p => Math.max((p.rtg || 70) - 55, 1));
  const wtotal  = weights.reduce((s, w) => s + w, 0);
  function pick() {
    let r = Math.random() * wtotal;
    for (let i = 0; i < scorers.length; i++) { r -= weights[i]; if (r <= 0) return scorers[i]; }
    return scorers[0];
  }
  const numGoals = won ? Math.floor(Math.random() * 3) + 2 : Math.floor(Math.random() * 3);
  for (let g = 0; g < numGoals; g++) {
    const scorer = pick();
    scorer.g   = (scorer.g   || 0) + 1;
    scorer.pts = (scorer.pts || 0) + 1;
    const helper = pick();
    if (helper !== scorer) { helper.a = (helper.a || 0) + 1; helper.pts = (helper.pts || 0) + 1; }
  }
  if (goal.length) goal[0].gp = (goal[0].gp || 0) + 1;
}

// ── Injuries (called once per week for user's team) ───────────
function rollInjuries(abbr) {
  const nhl = (ROSTERS[abbr] || []).filter(p => p.status === 'NHL' && p.pos !== 'G');
  nhl.forEach(p => {
    if (Math.random() < 0.016) {
      const g = Math.floor(Math.random() * 14) + 3;
      p.status = 'IR';
      GS.injuries.push({ player: p.name, team: abbr, gamesLeft: g });
      addNews('INJURY', 'tag-injury', `${p.name} placed on IR. Out ~${g} games.`);
    }
  });
  GS.injuries = GS.injuries.filter(inj => {
    inj.gamesLeft -= 3;
    if (inj.gamesLeft <= 0) {
      const p = (ROSTERS[inj.team] || []).find(x => x.name === inj.player && x.status === 'IR');
      if (p) p.status = 'NHL';
      if (inj.team === GS.team) addNews('RETURN', 'tag-sign', `${inj.player} activated from IR.`);
      return false;
    }
    return true;
  });
}

// ── Sim N weeks ───────────────────────────────────────────────
function simWeeks(n) {
  ensureSimState();
  if (GS.simPhase !== 'regular') return;
  for (let i = 0; i < n; i++) {
    // Play all games scheduled for this week
    GS.schedule.filter(g => g.week === GS.week).forEach(({ home, away }) => {
      const r = simGame(home, away);
      applyResult(r);
      accrueStats(home, r.w === home);
      accrueStats(away, r.w === away);
      GS.results.push({ week: GS.week, ...r });
      if (home === GS.team || away === GS.team) {
        const won = r.w === GS.team;
        const opp = home === GS.team ? away : home;
        const ug  = home === GS.team ? r.wg : r.lg;
        const og  = home === GS.team ? r.lg : r.wg;
        addNews(won?'WIN':'LOSS', won?'tag-sign':'tag-injury',
          `${TEAMS[GS.team]?.name} ${won?'defeat':'fall to'} ${TEAMS[opp]?.name||opp} ${ug}-${og}${r.ot?' (OT)':''}.`);
      }
    });
    rollInjuries(GS.team);
    GS.week++;
    // Check if season is over AFTER incrementing
    if (GS.week > NUM_WEEKS) {
      startPlayoffs();
      saveGame();
      return;
    }
  }
  saveGame();
}

function simToPlayoffs() {
  ensureSimState();
  while (GS.simPhase === 'regular') {
    if (GS.week > NUM_WEEKS) { startPlayoffs(); break; }
    simWeeks(1);
  }
}

// ── Playoffs ──────────────────────────────────────────────────
function getPlayoffSeeds() {
  const byConf={East:[],West:[]};
  Object.keys(TEAMS).forEach(a=>{ byConf[TEAMS[a].conf].push(a); });
  const sort=arr=>[...arr].sort((a,b)=>(GS.standings[b]?.pts||0)-(GS.standings[a]?.pts||0));
  return {East:sort(byConf.East).slice(0,8), West:sort(byConf.West).slice(0,8)};
}

function startPlayoffs() {
  GS.simPhase='playoffs';
  const seeds=getPlayoffSeeds();
  GS.playoffState={
    round:0,
    seeds,
    // [1v8, 2v7, 3v6, 4v5] per conf
    bracket:{
      East:[[seeds.East[0],seeds.East[7]],[seeds.East[1],seeds.East[6]],[seeds.East[2],seeds.East[5]],[seeds.East[3],seeds.East[4]]],
      West:[[seeds.West[0],seeds.West[7]],[seeds.West[1],seeds.West[6]],[seeds.West[2],seeds.West[5]],[seeds.West[3],seeds.West[4]]],
    },
    history:[],
    champion:null,
  };
  addNews('PLAYOFFS','tag-sign','🏒 The Stanley Cup Playoffs begin! 16 teams remain.');
  saveGame();
}

function simSeries(a,b) {
  let wa=0,wb=0;
  while(wa<4&&wb<4){ simGame(a,b).w===a?wa++:wb++; }
  return {winner:wa===4?a:b,loser:wa===4?b:a,wA:wa,wB:wb};
}

const ROUND_NAMES=['First Round','Second Round','Conference Finals','Stanley Cup Final'];

function simPlayoffRound() {
  ensureSimState();
  if (GS.simPhase!=='playoffs'||!GS.playoffState) return;
  const ps=GS.playoffState;
  const rName=ROUND_NAMES[ps.round]||'Round '+(ps.round+1);
  const nextE=[], nextW=[];

  if (ps.round<3) {
    ['East','West'].forEach(conf=>{
      const next=conf==='East'?nextE:nextW;
      (ps.bracket[conf]||[]).forEach(([a,b])=>{
        if(!a||!b) return;
        const s=simSeries(a,b);
        ps.history.push({round:rName,conf,...s});
        next.push(s.winner);
        addNews(rName.toUpperCase().slice(0,8),'tag-trade',
          `${TEAMS[s.winner]?.name||s.winner} eliminate ${TEAMS[s.loser]?.name||s.loser} 4-${Math.min(s.wA,s.wB)}.`);
      });
    });
    ps.round++;
    if (ps.round===1) {
      ps.bracket={
        East:[[nextE[0],nextE[1]],[nextE[2],nextE[3]]].filter(p=>p[0]&&p[1]),
        West:[[nextW[0],nextW[1]],[nextW[2],nextW[3]]].filter(p=>p[0]&&p[1]),
      };
    } else if (ps.round===2) {
      ps.bracket={East:[[nextE[0],nextE[1]]].filter(p=>p[0]&&p[1]),West:[[nextW[0],nextW[1]]].filter(p=>p[0]&&p[1])};
    } else if (ps.round===3) {
      // Conference Finals done — go to final
      ps.bracket={Final:[[nextE[0],nextW[0]]]};
    }
  } else {
    // Stanley Cup Final
    const [a,b]=(ps.bracket.Final||[[]])[0]||[];
    if (a&&b) {
      const s=simSeries(a,b);
      ps.champion=s.winner;
      ps.history.push({round:'Stanley Cup Final',conf:'Both',...s});
      const userWon=s.winner===GS.team;
      addNews('🏆 CHAMPION','tag-sign',
        `${TEAMS[s.winner]?.name||s.winner} WIN THE STANLEY CUP! Defeat ${TEAMS[s.loser]?.name||s.loser} 4-${Math.min(s.wA,s.wB)}.`);
      if (userWon) addNews('🎉 VICTORY','tag-sign','YOU ARE THE STANLEY CUP CHAMPION! Incredible!');
      GS.simPhase='offseason';
      saveGame();
    }
  }
  saveGame();
}

function simAllPlayoffs() {
  let guard=0;
  while (GS.simPhase==='playoffs'&&!GS.playoffState?.champion&&guard<10) {
    simPlayoffRound(); guard++;
  }
}

// ── Offseason ─────────────────────────────────────────────────
function runOffseason() {
  Object.values(ROSTERS).forEach(roster=>{
    roster.forEach(p=>{
      p.age=(p.age||25)+1;
      if (p.yrs>0) p.yrs--;
      p.g=0;p.a=0;p.pts=0;p.gp=0;
      // Development/decline curve
      if      (p.age<=24) p.rtg=Math.min(99,(p.rtg||75)+Math.floor(Math.random()*3));
      else if (p.age<=28) p.rtg=Math.min(99,(p.rtg||75)+Math.floor(Math.random()*2)-1);
      else if (p.age>=34) p.rtg=Math.max(55,(p.rtg||75)-Math.floor(Math.random()*3));
    });
  });
  GS.week=1; GS.simPhase='preseason'; GS.injuries=[];
  GS.results=[]; GS.playoffState=null;
  initStandings();
  generateSchedule();
  addNews('OFFSEASON','tag-info','New season! All players aged. Stats reset. Contracts decremented.');
  saveGame();
}

// ── Start regular season ──────────────────────────────────────
function startRegularSeason() {
  ensureSimState();
  initStandings();
  generateSchedule();
  GS.simPhase='regular'; GS.week=1; GS.injuries=[]; GS.results=[];
  addNews('SEASON START','tag-sign',`The 2025-26 NHL Season is underway! Good luck.`);
  saveGame(); renderSim(); renderDash();
}

// ── Render Simulation view ────────────────────────────────────
function renderSim() {
  ensureSimState();
  const abbr   = GS.team;
  const t      = TEAMS[abbr];
  const phase  = GS.simPhase;
  const st     = GS.standings?.[abbr]||{gp:0,w:0,l:0,otl:0,pts:0,gf:0,ga:0};
  const str    = teamStrength(abbr);
  const ps     = GS.playoffState;
  const champ  = ps?.champion;

  // Division standings
  const divTeams = Object.keys(TEAMS)
    .filter(a=>TEAMS[a].div===t.div)
    .sort((a,b)=>(GS.standings[b]?.pts||0)-(GS.standings[a]?.pts||0));

  // Recent games (user's team)
  const recent = [...(GS.results||[])]
    .filter(r=>r.w===abbr||r.l===abbr)
    .slice(-6).reverse();

  // Playoff history latest 6
  const plyHist = (ps?.history||[]).slice(-6).reverse();

  // User's playoff status
  const inBracket = ps && !champ && (
    Object.values(ps.bracket).flat().flat().includes(abbr)
  );

  $('view-sim').innerHTML = `
    <div class="vtitle">SEASON SIMULATION</div>

    <!-- Status banner -->
    <div style="background:var(--bg2);border:1px solid ${phase==='playoffs'?'var(--gold)':phase==='offseason'?'var(--green)':'var(--border)'};border-radius:6px;padding:14px 18px;margin-bottom:13px;display:flex;align-items:center;gap:18px;flex-wrap:wrap">
      <div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:1px;margin-bottom:3px">
          ${phase==='preseason'?'PRE-SEASON':phase==='regular'?'REGULAR SEASON — WEEK '+GS.week+' / '+NUM_WEEKS:phase==='playoffs'?'PLAYOFFS — ROUND '+((ps?.round||0)+1):phase==='offseason'?'OFFSEASON':'—'}
        </div>
        <div style="font-size:22px;font-weight:900;font-family:var(--mono)">
          ${phase==='regular'||phase==='preseason'?st.w+'-'+st.l+'-'+st.otl:champ?'🏆 '+(TEAMS[champ]?.name||champ):phase==='playoffs'?'In Progress':'Season Complete'}
        </div>
        ${phase==='regular'?`<div style="font-size:10px;color:var(--text2);margin-top:2px">${st.gp} GP · ${st.pts} PTS · Team Strength: <span style="color:${str>=85?'var(--green)':str>=75?'var(--gold)':'var(--red)'}">${str}</span></div>`:''}
        ${champ&&champ===abbr?`<div style="color:var(--green);font-size:12px;margin-top:4px">🎉 YOUR TEAM IS CHAMPION!</div>`:''}
        ${champ&&champ!==abbr?`<div style="color:var(--text2);font-size:11px;margin-top:2px">Season ended. Click New Season to continue.</div>`:''}
      </div>
      <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap">
        ${phase==='preseason'?`<button class="btn btn-ice" onclick="startRegularSeason()">▶ Start Season</button>`:''}
        ${phase==='regular'?`
          <button class="btn btn-outline" onclick="simWeeks(1);renderSim();renderDash()">Sim 1 Week</button>
          <button class="btn btn-outline" onclick="simWeeks(4);renderSim();renderDash()">Sim Month</button>
          <button class="btn btn-ice"     onclick="simToPlayoffs();renderSim();renderDash()">Sim to Playoffs</button>
        `:''}
        ${phase==='playoffs'&&!champ?`
          <button class="btn btn-outline" onclick="simPlayoffRound();renderSim();renderDash()">Sim Round</button>
          <button class="btn btn-ice"     onclick="simAllPlayoffs();renderSim();renderDash()">Sim All Playoffs</button>
        `:''}
        ${phase==='offseason'||champ?`<button class="btn btn-ice" onclick="runOffseason();renderSim();renderDash()">New Season</button>`:''}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:13px">
      <!-- Division standings -->
      <div class="panel">
        <div class="ptitle">${t.div.toUpperCase()} DIVISION</div>
        <table class="tbl"><thead><tr><th>#</th><th>TEAM</th><th>GP</th><th>W</th><th>L</th><th>OTL</th><th>PTS</th><th>STR</th></tr></thead>
        <tbody>
          ${divTeams.map((a,i)=>{
            const s=GS.standings[a]||{gp:0,w:0,l:0,otl:0,pts:0};
            const me=a===abbr;
            return `<tr style="${me?'background:rgba(79,195,247,.07)':''}">
              <td class="mono tdim">${i+1}</td>
              <td><div style="display:flex;align-items:center;gap:7px">
                <div style="width:16px;height:16px;border-radius:2px;background:${TEAMS[a].c1};flex-shrink:0"></div>
                <span style="${me?'color:var(--ice);font-weight:600':''}">${TEAMS[a]?.name||a}</span>
              </div></td>
              <td class="mono">${s.gp}</td><td class="mono">${s.w}</td>
              <td class="mono">${s.l}</td><td class="mono">${s.otl}</td>
              <td class="mono" style="font-weight:700">${s.pts}</td>
              <td><span class="rtg badge ${rtgClass(teamStrength(a))}">${teamStrength(a)}</span></td>
            </tr>`;
          }).join('')}
        </tbody></table>
      </div>

      <div>
        <!-- Recent results -->
        <div class="panel" style="margin-bottom:13px">
          <div class="ptitle">RECENT RESULTS</div>
          ${recent.length?recent.map(r=>{
            const won=r.w===abbr;
            const opp=won?r.l:r.w;
            const ug=won?r.wg:r.lg, og=won?r.lg:r.wg;
            return `<div style="display:flex;align-items:center;gap:10px;padding:6px 12px;border-bottom:1px solid var(--border)">
              <span class="badge ${won?'b-ntc':'b-ir'}" style="width:22px;text-align:center">${won?'W':'L'}</span>
              <span style="flex:1;font-size:11px">${TEAMS[opp]?.name||opp}</span>
              <span class="mono" style="font-weight:600;font-size:11px">${ug}–${og}</span>
              ${r.ot?'<span class="mono tdim" style="font-size:9px">OT</span>':''}
            </div>`;
          }).join(''):`<div class="pbody tdim" style="font-size:11px">No games played yet.</div>`}
        </div>

        <!-- Playoff bracket or offseason -->
        ${phase==='playoffs'&&ps?`
        <div class="panel">
          <div class="ptitle">PLAYOFF RESULTS</div>
          <div style="padding:4px 0">
            ${plyHist.map(r=>`
              <div style="padding:5px 12px;border-bottom:1px solid var(--border);font-size:11px">
                <div style="font-size:9px;color:var(--text3);font-family:var(--mono);margin-bottom:2px">${r.round.toUpperCase()}</div>
                <div style="display:flex;justify-content:space-between">
                  <span style="${r.winner===abbr?'color:var(--green);font-weight:600':''}">${TEAMS[r.winner]?.name||r.winner}</span>
                  <span class="mono tdim">def. ${TEAMS[r.loser]?.name||r.loser} 4-${Math.min(r.wA,r.wB)}</span>
                </div>
              </div>`).join('')||'<div class="pbody tdim" style="font-size:11px">Round not yet played.</div>'}
          </div>
        </div>`:''}

        ${phase==='preseason'?`
        <div class="panel">
          <div class="ptitle">HOW TO USE</div>
          <div class="pbody" style="font-size:11px;color:var(--text2);line-height:1.8">
            <div>▶ <strong>Start Season</strong> — begins Week 1 of 26</div>
            <div>▶ <strong>Sim 1 Week</strong> — plays ~3 games per team</div>
            <div>▶ <strong>Sim Month</strong> — advances 4 weeks at once</div>
            <div>▶ <strong>Sim to Playoffs</strong> — completes entire regular season</div>
            <div>▶ <strong>Sim Round</strong> — simulates one playoff round</div>
            <div>▶ <strong>New Season</strong> — ages players, resets stats</div>
          </div>
        </div>`:''}
      </div>
    </div>`;
}

</script>
</body>
</html>
